<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Annotator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="LamDe.css">
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-4 border-b border-gray-200">
            <h2 class="text-lg font-bold text-gray-700 mb-2">Tải thư mục</h2>
            <input type="file" id="folderInput" webkitdirectory directory multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
        </div>
        <div class="flex-1 overflow-y-auto p-2" id="fileList">
            <p class="text-gray-400 text-sm text-center mt-4">Chưa có ảnh nào</p>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <div class="flex-1 bg-gray-200 p-4 flex justify-center items-center overflow-auto" id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
        </div>
        
        <div class="h-16 bg-white border-t border-gray-200 flex justify-center items-center gap-4">
            <button id="btnPrev" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">❮ Trước</button>
            <span id="imageCounter" class="text-gray-600 font-medium">0 / 0</span>
            <button id="btnNext" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">Sau ❯</button>
        </div>
    </div>

    <div class="w-72 bg-white border-l border-gray-200 p-4 flex flex-col gap-6 overflow-y-auto">
        <div>
            <h3 class="font-bold text-gray-700 mb-2">Đổi tên & Lưu</h3>
            <input type="text" id="fileNameInput" placeholder="Tên ảnh mới..." class="w-full border border-gray-300 rounded px-3 py-2 mb-2 focus:outline-none focus:border-blue-500">
            
            <button id="btnSelectSaveDir" class="w-full bg-gray-200 text-gray-700 py-2 rounded hover:bg-gray-300 font-medium mb-1 text-sm">📁 Chọn thư mục lưu (Chrome/Edge)</button>
            <p id="saveDirStatus" class="text-xs text-green-600 mb-2 font-medium truncate hidden"></p>

            <button id="btnDownload" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-medium">Lưu ảnh</button>
        </div>

        <hr>

        <div>
            <h3 class="font-bold text-gray-700 mb-2">Thêm đối tượng</h3>
            <div class="grid grid-cols-2 gap-2">
                <button id="btnAddText" class="tool-btn">🔤 Thêm Text</button>
                <button id="btnAddArrow" class="tool-btn">↗️ Mũi tên</button>
                
                <button id="btnRectHollow" class="tool-btn">◻️ Vuông (Rỗng)</button>
                <button id="btnRectFill" class="tool-btn">⬛ Vuông (Đặc)</button>
                
                <button id="btnCircleHollow" class="tool-btn">◯ Tròn (Rỗng)</button>
                <button id="btnCircleFill" class="tool-btn">⬤ Tròn (Đặc)</button>
            </div>
            <p class="text-xs text-gray-500 mt-3 text-center">
    💡 <b>Xóa đối tượng:</b> Bấm phím Delete, hoặc <b>Chuột phải</b>, hoặc <b>Ấn giữ 1 giây</b> (trên điện thoại).
        </p>
        </div>
    </div>

    <script src="LamDe.js"></script>
</body>
</html>
